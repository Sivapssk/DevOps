name: Deploy Test

on:
  push:
    branches: ["test"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Run tests
        run: npm test

      - name: Security scan (npm audit)
        run: npm audit --audit-level=moderate || true

      - name: Build Docker image
        run: docker build -t myapp:test --build-arg NODE_ENV=test .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/myapp:test
          docker tag myapp:test $IMAGE
          docker push $IMAGE

      - name: Deploy to TEST (placeholder)
        run: echo "Deploy step to TEST would go here (k8s/apply or ssh)."

