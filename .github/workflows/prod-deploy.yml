name: Deploy Prod

on:
  push:
    branches: ["main"]
  release:
    types: [published]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t myapp:prod --build-arg NODE_ENV=production .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/myapp:prod
          docker tag myapp:prod $IMAGE
          docker push $IMAGE

      - name: Deploy to PROD (placeholder)
        run: echo \"Deploy step to PROD would go here (k8s/apply or ssh). Notification hook could be added.\"

